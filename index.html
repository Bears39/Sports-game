<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Go! | Mobile Sports</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; background: #08090e; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        /* Mobile Device Frame Container */
        .phone-container {
            width: 100%; max-width: 430px; height: 100vh; max-height: 850px;
            background: linear-gradient(180deg, #121420 0%, #0c0d14 100%);
            overflow-y: auto; display: flex; flex-direction: column;
            position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        @media (min-width: 440px) {
            .phone-container { border-radius: 36px; border: 6px solid #1e2235; height: 85vh; }
        }
        /* Game Dashboard Header */
        .header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(22, 25, 41, 0.8); backdrop-filter: blur(10px); sticky; top: 0; z-index: 10;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .profile { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; background: #ff007f; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; box-shadow: 0 0 10px rgba(255,0,127,0.4); }
        .stats { display: flex; gap: 12px; }
        .stat-bar { background: #1a1d2e; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 5px; }
        .stat-bar span { color: #00f2fe; }
        
        /* Main Banner */
        .hero { padding: 25px 20px 10px 20px; text-align: left; }
        .hero h1 { margin: 0; font-size: 28px; font-weight: 800; background: linear-gradient(90deg, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { margin: 5px 0 0 0; color: #6c7293; font-size: 14px; }

        /* Game Grid Container */
        .menu-grid { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .game-card {
            background: #161929; border: 1px solid rgba(255,255,255,0.03); border-radius: 20px;
            padding: 20px; display: flex; flex-direction: column; align-items: center; text-decoration: none;
            color: #fff; transition: transform 0.2s, background-color 0.2s; position: relative; overflow: hidden;
        }
        .game-card:active { transform: scale(0.95); background: #1e223a; }
        .game-icon { font-size: 44px; margin-bottom: 12px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
        .game-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; text-align: center; }
        .game-tag { font-size: 10px; color: #00e676; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        
        /* Premium Badge Decoration */
        .badge { position: absolute; top: 10px; right: 10px; background: rgba(255, 159, 67, 0.2); color: #ff9f43; font-size: 8px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="header">
            <div class="profile">
                <div class="avatar">PRO</div>
                <div>
                    <div style="font-size: 12px; font-weight: bold;">Player1</div>
                    <div style="font-size: 10px; color: #6c7293;">Rank: Pro Amateur</div>
                </div>
            </div>
            <div class="stats">
                <div class="stat-bar">⚡ <span>100</span></div>
                <div class="stat-bar">🪙 <span>2.5K</span></div>
            </div>
        </div>

        <div class="hero">
            <h1>SPORTS ARCADE</h1>
            <p>Select an event to compete globally</p>
        </div>

        <div class="menu-grid">
            <a href="basketball-shoot.html" class="game-card">
                <div class="badge">POPULAR</div>
                <div class="game-icon">🏀</div>
                <div class="game-title">Hoop Stars</div>
                <div class="game-tag">Tap To Shoot</div>
            </a>
            <a href="soccer-penalty.html" class="game-card">
                <div class="game-icon">⚽</div>
                <div class="game-title">Penalty Kick</div>
                <div class="game-tag">Precision Striker</div>
            </a>
            <a href="#" class="game-card" style="opacity: 0.5;">
                <div class="game-icon">⚾</div>
                <div class="game-title">Home Run Hero</div>
                <div class="game-tag">Locked</div>
            </a>
            <a href="#" class="game-card" style="opacity: 0.5;">
                <div class="game-icon">🏈</div>
                <div class="game-title">Gridiron Kick</div>
                <div class="game-tag">Locked</div>
            </a>
        </div>
    </div>

</body>
</html>
