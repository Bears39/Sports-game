<!DOCTYPE html>
<html>
<head>
    <title>Tennis Volley</title>
    <style>
        body { background: #222; color: #fff; text-align: center; font-family: sans-serif; }
        #court { width: 300px; height: 30px; background: #ffa502; margin: 50px auto; position: relative; border-radius: 5px;}
        #racket { width: 60px; height: 100%; background: #2ed573; position: absolute; cursor: pointer;}
        a { color: #aaa; display: block; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🎾 Tennis Volley</h1>
    <p>Click the green racket when it spawns to return the ball!</p>
    <div id="court"><div id="racket" onclick="hit()"></div></div>
    <h2 id="result">Score: 0</h2>
    <a href="index.html">← Back to Arcade</a>

    <script>
        let score = 0;
        let racket = document.getElementById('racket');
        function moveRacket() {
            let randomLeft = Math.floor(Math.random() * 240);
            racket.style.left = randomLeft + 'px';
        }
        function hit() {
            score++;
            document.getElementById('result').textContent = "Score: " + score + " 🎾 Nice Volley!";
            moveRacket();
        }
        moveRacket();
    </script>
</body>
</html>
