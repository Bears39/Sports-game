<!DOCTYPE html>
<html>
<head>
    <title>Archery Target</title>
    <style>
        body { background: #222; color: #fff; text-align: center; font-family: sans-serif; }
        #field { width: 100%; height: 200px; position: relative; background: #2f3542; overflow: hidden; margin-top: 20px;}
        #target { width: 60px; height: 60px; background: red; border-radius: 50%; border: 10px solid white; position: absolute; cursor: pointer; top: 60px; line-height: 60px; font-size: 20px;}
        a { color: #aaa; display: block; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🎯 Archery Target</h1>
    <p>Click right on the moving target to fire your arrow!</p>
    <div id="field"><div id="target" onclick="hit()">🎯</div></div>
    <h2 id="result"></h2>
    <a href="index.html">← Back to Arcade</a>

    <script>
        let target = document.getElementById('target');
        let x = 0; let speed = 5;
        setInterval(() => {
            x += speed;
            if(x > window.innerWidth - 80 || x < 0) speed *= -1;
            target.style.left = x + 'px';
        }, 20);
        function hit() {
            document.getElementById('result').textContent = "🎯 BULLSEYE! 10 Points!";
            document.getElementById('result').style.color = "#2ed573";
        }
    </script>
</body>
</html>
